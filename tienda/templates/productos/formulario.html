{% extends "base.html" %}
{% block titulo %}Agregar producto{% endblock %}
{% block contenido %}
    <h1>Nuevo producto</h1>
    <form method="POST">
        <p><label>Nombre: <input name="nombre" required></label></p>
        <p><label>Precio: <input name="precio" type="number" step="0.01" required></label></p>
        <button class="btn" type="submit">Guardar</button>
    </form>
{% endblock %}
